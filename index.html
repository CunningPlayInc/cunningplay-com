<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cunningplay LLC</title>
  <meta name="description" content="Cunningplay LLC is a Washington-based software publisher. Currently developing Ashenmarch, a GPS-territory game for iOS, Android, and web.">
  <meta name="theme-color" content="#0c0b08">
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font-family: Georgia, "Times New Roman", serif;
      max-width: 34em;
      margin: 4em auto;
      padding: 0 1.5em;
      color: #1a1a1a;
      line-height: 1.65;
      background: #fdfcf7;
    }
    h1 {
      font-size: 1.6em;
      margin-bottom: 0.2em;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .tagline {
      color: #555;
      margin-top: 0;
      margin-bottom: 2.2em;
      font-style: italic;
    }
    p { margin: 1em 0; }
    a {
      color: #6b5b3a;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }
    a:hover { color: #1a1a1a; }
    .contact {
      margin-top: 3em;
      padding-top: 1em;
      border-top: 1px solid #e0d9c4;
      font-size: 0.9em;
      color: #555;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0c0b08; color: #ded1b8; }
      .tagline { color: #9c947a; }
      a { color: #c9a044; }
      a:hover { color: #ded1b8; }
      .contact { border-top-color: #2a2620; color: #9c947a; }
    }
  </style>
</head>
<body>
  <h1>Cunningplay LLC</h1>
  <p class="tagline">Washington-based software publisher.</p>

  <p>Currently developing <a href="https://ashenmarch.com">Ashenmarch</a> — a GPS-territory game for iOS, Android, and web.</p>

  <p>More projects in time.</p>

  <p class="contact">
    contact@cunningplay.com
  </p>
</body>
</html>
